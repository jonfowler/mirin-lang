[package]
name = "mirin-fmt"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

# A rustfmt-shaped formatter for Mirin. Re-emits source from the tree-sitter
# CST through a Wadler/Prettier-style width-aware pretty printer.
#
# The grammar is shared with the rest of the workspace via `mirin-compiler`,
# which owns the single tree-sitter link. (We deliberately do not link the C
# grammar ourselves: that would clash with `mirin-compiler`'s copy when both end
# up in one binary — e.g. `mirin-lsp`, which uses this crate for formatting.)

[lib]
name = "mirin_fmt"
path = "src/lib.rs"

[[bin]]
name = "mirin-fmt"
path = "src/main.rs"

[dependencies]
mirin-compiler = { path = "../mirin-compiler" }
tree-sitter = "0.25"
