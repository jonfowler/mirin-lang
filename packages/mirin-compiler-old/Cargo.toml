[package]
name = "mirin-compiler-old"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

# The original whole-crate-pass compiler, kept as a parity oracle after the
# query-based reimplementation (now `mirin-compiler`) reached corpus parity at
# Q5-mono. Not on the build path of anything; retained for reference/diffing.

[dependencies]
tree-sitter = "0.25"
tree-sitter-language = "0.1"

[build-dependencies]
cc = "1.1"
