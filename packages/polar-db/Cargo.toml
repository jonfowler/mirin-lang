[package]
name = "polar-db"
version = "0.1.0"
edition = "2024"

# The query-based reimplementation of the compiler front-to-back
# (planning/query_engine.md). Standalone: it links the tree-sitter grammar
# itself and does not depend on `polar-compiler`, which remains a runnable
# reference oracle until this crate reaches parity (Q5) and replaces it.
#
# Engine: salsa (validated by the Q0 spike, see planning/query_engine.md §7).

[lib]
name = "polar_db"
path = "src/lib.rs"

[[bin]]
name = "polar-db"
path = "src/main.rs"

[dependencies]
tree-sitter = "0.25"
tree-sitter-language = "0.1"
salsa = "0.26"

[build-dependencies]
cc = "1.1"
