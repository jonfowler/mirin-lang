[package]
name = "polar-fmt"
version = "0.1.0"
edition = "2024"

# A rustfmt-shaped formatter for Polar. Re-emits source from the tree-sitter
# CST through a Wadler/Prettier-style width-aware pretty printer.
#
# The grammar is shared with the rest of the workspace via `polar-compiler`,
# which owns the single tree-sitter link. (We deliberately do not link the C
# grammar ourselves: that would clash with `polar-compiler`'s copy when both end
# up in one binary — e.g. `polar-lsp`, which uses this crate for formatting.)

[lib]
name = "polar_fmt"
path = "src/lib.rs"

[[bin]]
name = "polar-fmt"
path = "src/main.rs"

[dependencies]
polar-compiler = { path = "../polar-compiler" }
tree-sitter = "0.25"
